<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Weekly Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0e0e0e;
      --paper: #f5f0e8;
      --accent: #c0392b;
      --muted: #7a7060;
      --rule: #d4cfc5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.75rem 1.75rem 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--rule);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--ink); border-color: var(--ink); }
    .back-btn::before { content: '←'; font-size: 1.1rem; }

    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 2rem 0 1rem;
      text-align: center;
      background: var(--paper);
      position: relative;
    }
    .masthead-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .masthead-title span { color: var(--accent); }

    .masthead-meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-top: 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .masthead-meta .dot { color: var(--accent); }

    .header-edit-btn {
      display: inline-flex;
      align-items: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--rule);
      padding: 0 0.2rem;
      transition: color 0.15s, transform 0.15s;
      border-bottom: 1px solid transparent;
    }
    .header-edit-btn:hover {
      color: var(--muted);
      border-bottom-color: var(--muted);
      transform: scale(1.15);
    }

    .deck {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .cards { display: flex; flex-direction: column; }

    .card-wrap {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      padding: 0 0.6rem;
      margin: 0 -0.6rem;
    }
    .card-wrap:first-child { border-top: 1px solid var(--rule); }

    .card-check {
      flex-shrink: 0;
      width: 1.1rem;
      height: 1.1rem;
      appearance: none;
      -webkit-appearance: none;
      border: 1.5px solid var(--rule);
      border-radius: 3px;
      cursor: pointer;
      margin-right: 0.85rem;
      transition: border-color 0.15s;
      position: relative;
      background: transparent;
    }
    .card-check:hover:not(:checked) { border-color: var(--muted); }
    .card-check:checked { border-color: var(--muted); }
    .card-check:checked::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 7px;
      border: 1.5px solid var(--muted);
      border-top: none;
      border-left: none;
      transform: translate(-50%, -60%) rotate(40deg);
    }

    .card {
      flex: 1;
      display: grid;
      grid-template-columns: 3.5rem 1fr;
      gap: 0 1.5rem;
      padding: 2rem 0;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .card-wrap:hover { background: rgba(255,255,255,0.5); }
    .card-wrap:hover .card-headline { text-decoration: underline; text-decoration-color: var(--accent); }
    .card-wrap:hover .card-number { color: var(--accent); transition: color 0.2s; }

    .card-number {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--rule);
      line-height: 1;
      padding-top: 0.2rem;
      user-select: none;
    }

    .card-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .card-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.6rem;
      color: var(--ink);
    }
    .card-desc {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #444;
      font-weight: 300;
      max-width: 580px;
    }

    .card-edit-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.15s, border-color 0.15s, transform 0.15s;
    }
    .card-edit-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: scale(1.1);
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--rule);
      text-transform: uppercase;
      border-top: 1px solid var(--rule);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14, 14, 14, 0.5);
      backdrop-filter: blur(2px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 6px;
      width: 100%;
      max-width: 500px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: modal-in 0.18s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 1.5rem 1rem;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .modal-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--muted);
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .modal-close:hover { color: var(--ink); background: var(--rule); }

    .modal-body {
      overflow-y: auto;
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .field-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .field-row   { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field-input,
    .field-textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      padding: 0.4rem 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus,
    .field-textarea:focus { border-bottom-color: var(--ink); }
    .field-textarea { resize: vertical; min-height: 60px; }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem 1.4rem;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .modal-footer-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .clear-btn {
      background: none;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 0.6rem 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .clear-btn:hover { color: var(--accent); border-color: var(--accent); }
    .clear-btn.hidden { display: none; }
    .reset-btn {
      background: none;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 0.6rem 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: var(--ink); border-color: var(--ink); }
    .reset-btn.hidden { display: none; }
    .save-msg {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: #5a9e5a;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-msg.visible { opacity: 1; }
    .save-btn {
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 4px;
      padding: 0.6rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--accent); }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    /* Read-only mode — hide all editing controls */
    body:not(.edit-mode) .card-edit-btn,
    body:not(.edit-mode) .card-check,
    body:not(.edit-mode) .header-edit-btn,
    body:not(.edit-mode) .modal-overlay { display: none !important; }

    @media (max-width: 540px) {
      .card { grid-template-columns: 2.5rem 1fr; gap: 0 1rem; }
      .card-number { font-size: 2.5rem; }
      .card-edit-btn { display: none; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a class="back-btn" href="LandingPage.html">Calendar</a>
</div>

<header class="masthead">
  <div class="masthead-eyebrow">Curated Intelligence</div>
  <div class="masthead-title">AI Weekly<br><span>Signal</span></div>
  <div class="masthead-meta">
    <span id="edition-num">—</span>
    <span class="dot">◆</span>
    <span id="edition-date">—</span>
    <span class="dot">◆</span>
    <span>Top 5 Stories</span>
    <button class="header-edit-btn" id="header-edit-btn" title="Edit edition info">
      <svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10.5 1.5L13.5 4.5L4.5 13.5H1.5V10.5L10.5 1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8.5 3.5L11.5 6.5" stroke="currentColor" stroke-width="1.4"/>
      </svg>
    </button>
  </div>
</header>

<main class="deck">
  <div class="section-label">This week's picks</div>
  <div class="cards" id="cards"></div>
</main>

<footer>AI Weekly Signal &nbsp;◆&nbsp; Curated by hand, every week</footer>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Edit</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div style="display:flex;gap:0.5rem;">
        <button class="clear-btn hidden" id="clear-btn">Clear</button>
        <button class="reset-btn hidden" id="reset-btn">Reset</button>
      </div>
      <div class="modal-footer-right">
        <span class="save-msg" id="save-msg">Saved ✓</span>
        <button class="save-btn" id="save-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
  const BLANK_NEWS = () => Array.from({ length: 5 }, (_, i) => ({
    tag: ['Models','Research','Industry','Policy','Tools'][i],
    headline: `Your story ${i + 1} headline goes here`,
    desc: 'A short 1–2 sentence summary of why this story matters and what happened.',
    url: 'https://example.com',
    checked: false
  }));

  // Read ?date=YYYY-MM-DD from URL, fall back to today's most-recent Friday
  function getDateParam() {
    const p = new URLSearchParams(location.search).get('date');
    if (p) return p;
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 1 : day === 6 ? 0 : day - 5 + (day < 5 ? -7 : 0)));
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  }

  const DATE_KEY = getDateParam();
  const EDITION_TYPE = new URLSearchParams(location.search).get('type') || 'weekly';
  const EDIT_MODE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
                 || new URLSearchParams(location.search).get('edit') === '1';
  if (EDIT_MODE) document.body.classList.add('edit-mode');
  let allEditions     = [];
  let currentData     = null;
  let saveCallback    = null;
  let activeStoryIdx  = null;

  // ── Render ──────────────────────────────────────────────────
  function render(data) {
    document.querySelector('.masthead-eyebrow').textContent =
      EDITION_TYPE === 'monthly' ? 'Monthly Recap' : 'Curated Intelligence';
    document.getElementById('edition-num').textContent  = `Vol. ${data.edition.number}`;
    document.getElementById('edition-date').textContent = data.edition.date;
    document.title = `AI Weekly Signal — ${data.edition.date}`;

    const container = document.getElementById('cards');
    container.innerHTML = '';

    data.news.forEach((item, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const a = document.createElement('a');
      a.className = 'card';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
        <div class="card-body">
          <div class="card-tag">${item.tag}</div>
          <div class="card-headline">${item.headline}</div>
          <div class="card-desc">${item.desc}</div>
        </div>
      `;

      const check = document.createElement('input');
      check.type = 'checkbox';
      check.className = 'card-check';
      check.checked = !!item.checked;
      check.title = 'Mark story as ready';
      check.addEventListener('change', () => toggleCheck(i, check.checked));

      const editBtn = document.createElement('button');
      editBtn.className = 'card-edit-btn';
      editBtn.title = `Edit story ${i + 1}`;
      editBtn.innerHTML = `
        <svg width="12" height="12" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.5 1.5L13.5 4.5L4.5 13.5H1.5V10.5L10.5 1.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M8.5 3.5L11.5 6.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      `;
      editBtn.addEventListener('click', () => openStoryModal(i));

      wrap.appendChild(check);
      wrap.appendChild(a);
      wrap.appendChild(editBtn);
      container.appendChild(wrap);
    });
  }

  // ── Header modal ────────────────────────────────────────────
  function openHeaderModal() {
    document.getElementById('modal-title').textContent    = 'Edit Header';
    document.getElementById('modal-subtitle').textContent = 'Vol. & Date';
    document.getElementById('modal-body').innerHTML = `
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Vol. Number</label>
          <input class="field-input" id="f-vol" type="number" min="1" value="${currentData.edition.number}">
        </div>
        <div class="field-group">
          <label class="field-label">Date</label>
          <input class="field-input" id="f-date" type="text" value="${currentData.edition.date}">
        </div>
      </div>
    `;
    saveCallback = () => {
      const updated = JSON.parse(JSON.stringify(currentData));
      updated.edition.number = parseInt(document.getElementById('f-vol').value, 10);
      updated.edition.date   = document.getElementById('f-date').value.trim();
      return updated;
    };
    showModal();
  }

  // ── Story modal ─────────────────────────────────────────────
  function openStoryModal(i) {
    activeStoryIdx = i;
    const item = currentData.news[i];
    const tags = ['Models','Research','Industry','Policy','Tools','Business','Science','Ethics','Products'];
    document.getElementById('modal-title').textContent    = `Story ${i + 1}`;
    document.getElementById('modal-subtitle').textContent = item.tag;
    document.getElementById('modal-body').innerHTML = `
      <div class="field-group">
        <label class="field-label">Tag</label>
        <input class="field-input" id="f-tag" type="text" value="${item.tag}" list="tag-suggestions">
        <datalist id="tag-suggestions">${tags.map(t => `<option value="${t}">`).join('')}</datalist>
      </div>
      <div class="field-group">
        <label class="field-label">Headline</label>
        <input class="field-input" id="f-headline" type="text" value="${item.headline}">
      </div>
      <div class="field-group">
        <label class="field-label">Summary</label>
        <textarea class="field-textarea" id="f-desc">${item.desc}</textarea>
      </div>
      <div class="field-group">
        <label class="field-label">URL</label>
        <input class="field-input" id="f-url" type="text" value="${item.url}">
      </div>
    `;
    saveCallback = () => {
      const updated = JSON.parse(JSON.stringify(currentData));
      updated.news[i].tag      = document.getElementById('f-tag').value.trim();
      updated.news[i].headline = document.getElementById('f-headline').value.trim();
      updated.news[i].desc     = document.getElementById('f-desc').value.trim();
      updated.news[i].url      = document.getElementById('f-url').value.trim();
      return updated;
    };
    showModal(true);
  }

  // ── Modal helpers ───────────────────────────────────────────
  function showModal(showClear = false) {
    document.getElementById('save-msg').classList.remove('visible');
    document.getElementById('save-btn').disabled = false;
    document.getElementById('clear-btn').classList.toggle('hidden', !showClear);
    document.getElementById('reset-btn').classList.toggle('hidden', !showClear);
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => {
      const first = document.querySelector('.modal-body .field-input, .modal-body .field-textarea');
      if (first) first.focus();
    }, 50);
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    saveCallback = null;
  }

  document.getElementById('header-edit-btn').addEventListener('click', openHeaderModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('clear-btn').addEventListener('click', () => {
    const inputs = document.querySelectorAll('.modal-body .field-input, .modal-body .field-textarea');
    inputs.forEach(el => { el.value = ''; });
    const first = inputs[0];
    if (first) first.focus();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (activeStoryIdx === null) return;
    const defaults = BLANK_NEWS()[activeStoryIdx];
    document.getElementById('f-tag').value      = defaults.tag;
    document.getElementById('f-headline').value = defaults.headline;
    document.getElementById('f-desc').value     = defaults.desc;
    document.getElementById('f-url').value      = defaults.url;
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Checkbox toggle (auto-save) ─────────────────────────────
  async function toggleCheck(i, checked) {
    if (!EDIT_MODE) return;
    currentData.news[i].checked = checked;
    const filled = currentData.news.filter(s => s.checked).length;
    const idx = allEditions.findIndex(e => e.date === DATE_KEY);
    const entry = { ...currentData, date: DATE_KEY, type: EDITION_TYPE, filled };
    if (idx >= 0) allEditions[idx] = entry;
    else          allEditions.push(entry);
    try {
      await fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file: 'editions.json', data: allEditions })
      });
    } catch (e) {
      console.error('Could not save checkbox state:', e);
    }
  }

  // ── Save ────────────────────────────────────────────────────
  document.getElementById('save-btn').addEventListener('click', async () => {
    if (!EDIT_MODE || !saveCallback) return;
    const btn = document.getElementById('save-btn');
    const msg = document.getElementById('save-msg');
    btn.disabled = true;

    const updatedEdition = saveCallback();
    currentData = updatedEdition;

    // Count checked stories
    const filled = updatedEdition.news.filter(s => s.checked).length;

    // Upsert this edition into the allEditions array
    const idx = allEditions.findIndex(e => e.date === DATE_KEY);
    const entry = { ...updatedEdition, date: DATE_KEY, type: EDITION_TYPE, filled };
    if (idx >= 0) allEditions[idx] = entry;
    else          allEditions.push(entry);

    try {
      const res  = await fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file: 'editions.json', data: allEditions })
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error);

      render(currentData);
      msg.classList.add('visible');
      setTimeout(() => { msg.classList.remove('visible'); closeModal(); }, 1000);
    } catch (e) {
      alert('Could not save: ' + e.message);
      btn.disabled = false;
    }
  });

  // ── Load ────────────────────────────────────────────────────
  fetch('./editions.json')
    .then(r => r.json())
    .then(all => {
      allEditions = all;
      const found = all.find(e => e.date === DATE_KEY);
      if (found) {
        const { date, ...rest } = found;
        currentData = rest;
      } else {
        // New edition — create blank template for this date
        currentData = {
          edition: { number: all.length + 1, date: new Date(DATE_KEY + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) },
          news: BLANK_NEWS()
        };
      }
      render(currentData);
    })
    .catch(() => alert('Could not load editions.json — is server.js running?'));
</script>

</body>
</html>
